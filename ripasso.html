<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angolo dello Studio e Ripasso - Tabelline 🧠</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }
        h1, h2 { font-family: 'Fredoka One', cursive; }

        /* Colori vivaci ufficiali per i bottoni del menu */
        .rainbow-all { background-color: #a855f7; color: white; } /* Viola per il tasto "Tutte" */
        .rainbow-1 { background-color: #ff7675; }
        .rainbow-2 { background-color: #fab1a0; }
        .rainbow-3 { background-color: #ffeaa7; }
        .rainbow-4 { background-color: #55efc4; }
        .rainbow-5 { background-color: #81ecec; }
        .rainbow-6 { background-color: #74b9ff; }
        .rainbow-7 { background-color: #a29bfe; }
        .rainbow-8 { background-color: #fd79a8; }
        .rainbow-9 { background-color: #e84393; }
        .rainbow-10 { background-color: #f6d66f; }

        /* Animazione fluida di comparsa per le colonne */
        .colonna-animata {
            animation: slideDown 0.4s ease-out forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center py-8 px-4">

    <div class="max-w-6xl w-full bg-white rounded-3xl shadow-2xl border-8 border-blue-300 p-6">
        <header class="text-center mb-6">
            <h2 class="text-3xl md:text-4xl text-blue-500 drop-shadow-sm">🧠 Angolo dello Studio & Ripasso 🧠</h2>
            <p class="text-slate-600 font-medium mt-1 text-lg">Scegli una tabellina da approfondire oppure guardale tutte insieme sulla LIM!</p>
        </header>

        <div class="flex flex-wrap justify-center gap-3 mb-8">
            <button onclick="mostraTutteLeTabelline()" class="px-5 h-12 rounded-xl rainbow-all border-2 border-black/20 text-xl font-bold shadow-md hover:scale-105 active:scale-95 transition-all flex items-center gap-1">
                ⭐ Tutte
            </button>
            <div class="h-12 w-0.5 bg-slate-300 mx-1 hidden sm:block"></div> <button onclick="mostraStudioTabellina(1)" class="w-12 h-12 rounded-xl rainbow-1 border-2 border-black/20 text-xl font-bold text-slate-800 shadow-md hover:scale-110 active:scale-95 transition-all">1</button>
            <button onclick="mostraStudioTabellina(2)" class="w-12 h-12 rounded-xl rainbow-2 border-2 border-black/20 text-xl font-bold text-slate-800 shadow-md hover:scale-110 active:scale-95 transition-all">2</button>
            <button onclick="mostraStudioTabellina(3)" class="w-12 h-12 rounded-xl rainbow-3 border-2 border-black/20 text-xl font-bold text-slate-800 shadow-md hover:scale-110 active:scale-95 transition-all">3</button>
            <button onclick="mostraStudioTabellina(4)" class="w-12 h-12 rounded-xl rainbow-4 border-2 border-black/20 text-xl font-bold text-slate-800 shadow-md hover:scale-110 active:scale-95 transition-all">4</button>
            <button onclick="mostraStudioTabellina(5)" class="w-12 h-12 rounded-xl rainbow-5 border-2 border-black/20 text-xl font-bold text-slate-800 shadow-md hover:scale-110 active:scale-95 transition-all">5</button>
            <button onclick="mostraStudioTabellina(6)" class="w-12 h-12 rounded-xl rainbow-6 border-2 border-black/20 text-xl font-bold text-slate-800 shadow-md hover:scale-110 active:scale-95 transition-all">6</button>
            <button onclick="mostraStudioTabellina(7)" class="w-12 h-12 rounded-xl rainbow-7 border-2 border-black/20 text-xl font-bold text-slate-800 shadow-md hover:scale-110 active:scale-95 transition-all">7</button>
            <button onclick="mostraStudioTabellina(8)" class="w-12 h-12 rounded-xl rainbow-8 border-2 border-black/20 text-xl font-bold text-slate-800 shadow-md hover:scale-110 active:scale-95 transition-all">8</button>
            <button onclick="mostraStudioTabellina(9)" class="w-12 h-12 rounded-xl rainbow-9 border-2 border-black/20 text-xl font-bold text-slate-800 shadow-md hover:scale-110 active:scale-95 transition-all">9</button>
            <button onclick="mostraStudioTabellina(10)" class="w-12 h-12 rounded-xl rainbow-10 border-2 border-black/20 text-xl font-bold text-slate-800 shadow-md hover:scale-110 active:scale-95 transition-all">10</button>
        </div>

        <div id="container-colonne-studio" class="flex flex-wrap justify-center gap-6 min-h-[250px] p-2 overflow-x-auto">
            <p class="text-slate-400 italic text-xl my-8 text-center w-full">Clicca su un numero o su "Tutte" per visualizzare le colonne di studio stile quaderno!</p>
        </div>
    </div>

    <script>
        const containerColonne = document.getElementById('container-colonne-studio');

        // Canali RGBA per gestire lo sfondo leggero (al 40%) e i bordi carichi (al 90%)
        const configurazioneColori = {
            1: { bg: 'rgba(255, 118, 117, 0.40)', border: 'rgba(255, 118, 117, 0.90)' },
            2: { bg: 'rgba(250, 177, 160, 0.40)', border: 'rgba(250, 177, 160, 0.90)' },
            3: { bg: 'rgba(255, 234, 167, 0.40)', border: 'rgba(214, 191, 115, 0.90)' }, // Ottimizzato per contrasto del giallo
            4: { bg: 'rgba(85, 239, 196, 0.40)', border: 'rgba(85, 239, 196, 0.90)' },
            5: { bg: 'rgba(129, 236, 236, 0.40)', border: 'rgba(129, 236, 236, 0.90)' },
            6: { bg: 'rgba(116, 185, 255, 0.40)', border: 'rgba(116, 185, 255, 0.90)' },
            7: { bg: 'rgba(162, 155, 254, 0.40)', border: 'rgba(162, 155, 254, 0.90)' },
            8: { bg: 'rgba(253, 121, 168, 0.40)', border: 'rgba(253, 121, 168, 0.90)' },
            9: { bg: 'rgba(232, 67, 147, 0.40)', border: 'rgba(232, 67, 147, 0.90)' },
            10: { bg: 'rgba(246, 214, 111, 0.40)', border: 'rgba(224, 191, 85, 0.90)' }
        };

        // Funzione helper per generare la stringa HTML di una singola colonna
        function generaHtmlColonna(num) {
            const schema = configurazioneColori[num] || { bg: 'rgba(255,255,255,0.4)', border: 'rgba(0,0,0,0.2)' };
            
            let righeMoltiplicazioni = '';
            for (let i = 1; i <= 10; i++) {
                righeMoltiplicazioni += `
                    <div class="flex justify-between items-center text-xl font-bold text-slate-800 py-2 border-b border-black/5 last:border-none">
                        <span class="text-slate-700">${num} &times; ${i}</span>
                        <span class="text-2xl font-black text-slate-900 bg-white/60 px-3 py-0.5 rounded-lg shadow-sm">${num * i}</span>
                    </div>
                `;
            }

            return `
                <div class="colonna-animata w-full max-w-[270px] rounded-3xl p-5 border-4 shadow-md flex-shrink-0" 
                     style="background-color: ${schema.bg}; border-color: ${schema.border};">
                    <div class="text-3xl font-black text-slate-900 mb-4 border-b-4 border-black/10 pb-2 flex justify-center items-center gap-2">
                        <span>Tabellina del</span> 
                        <span class="bg-slate-900 text-white px-3 py-0.5 rounded-xl text-2xl shadow-sm">${num}</span>
                    </div>
                    <div class="flex flex-col gap-0.5 px-1">
                        ${righeMoltiplicazioni}
                    </div>
                </div>
            `;
        }

        // Mostra una singola colonna centrata
        function mostraStudioTabellina(numero) {
            containerColonne.innerHTML = generaHtmlColonna(numero);
        }

        // Mostra tutte e 10 le colonne affiancate in griglia/riga orizzontale
        function mostraTutteLeTabelline() {
            let tuttoHtml = '';
            for (let n = 1; n <= 10; n++) {
                tuttoHtml += generaHtmlColonna(n);
            }
            containerColonne.innerHTML = tuttoHtml;
        }
    </script>
</body>
</html>

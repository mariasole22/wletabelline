<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il Fattore Mancante 🕵️‍♂️✨</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --primary: #4361ee;
      --success: #2ec4b6;
      --warning: #ff9f1c;
      --danger: #e63946;
      --text: #1d3557;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      background: var(--card);
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    h1 { margin: 0 0 1rem; font-size: 1.5rem; }
    .section { margin: 1.5rem 0; }
    .label { font-weight: 600; margin-bottom: 0.5rem; display: block; }
    .tables-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 1rem;
    }
    .tables-grid label {
      background: #eef2ff;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      transition: 0.2s;
    }
    .tables-grid input:checked + span {
      background: var(--primary);
      color: white;
    }
    .tables-grid span {
      display: block;
      padding: 6px 0;
      border-radius: 6px;
    }
    .diff-btns {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .diff-btn {
      flex: 1;
      min-width: 90px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #e2e8f0;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    .diff-btn.active { background: var(--primary); color: white; transform: scale(1.05); }
    .diff-btn:hover { opacity: 0.9; }
    .start-btn {
      background: var(--success);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 1rem;
      width: 100%;
    }
    .hidden { display: none !important; }
    .game-ui { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .question-box {
      font-size: 2.2rem;
      font-weight: bold;
      margin: 2rem 0;
      background: #f8fafc;
      padding: 1.5rem;
      border-radius: 12px;
      border: 2px solid #e2e8f0;
    }
    .input-row { display: flex; gap: 10px; margin-bottom: 1rem; }
    .input-row input {
      flex: 1;
      padding: 12px;
      font-size: 1.2rem;
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      text-align: center;
    }
    .input-row button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0 20px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    .result-box {
      background: #ecfdf5;
      padding: 2rem;
      border-radius: 12px;
      margin-top: 1rem;
    }
    .stars { font-size: 1.8rem; margin: 10px 0; }
    .nav-btn {
      background: #64748b;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- MENU -->
    <div id="menu-screen">
      <h1>Il Fattore Mancante 🕵️‍♂️✨<br><small style="font-size:0.9rem; opacity:0.8">Trova il Fattore Mancante! 🕵️‍♂️🔎</small></h1>
      
      <div class="section">
        <span class="label">1. Scegli le tabelline:</span>
        <div class="tables-grid" id="tables-grid"></div>
      </div>

      <div class="section">
        <span class="label">2. Scegli la difficoltà:</span>
        <div class="diff-btns">
          <button class="diff-btn active" data-diff="12">Facile 😊<br><small>12 Domande</small></button>
          <button class="diff-btn" data-diff="18">Medio 🤔<br><small>18 Domande</small></button>
          <button class="diff-btn" data-diff="24">Difficile 🔥<br><small>24 Domande</small></button>
        </div>
      </div>

      <button class="start-btn" id="start-btn">Si parte! 🚀</button>
    </div>

    <!-- GIOCO -->
    <div id="game-screen" class="hidden">
      <div class="game-ui">
        <span id="q-counter">Domanda: 1 / 12</span>
        <span id="stars-counter">Stelle: ⭐ 0</span>
        <button class="nav-btn" id="exit-btn">🏠 Esci</button>
      </div>
      <div class="question-box" id="question-text">? × 3 = 12</div>
      <div class="input-row">
        <input type="number" id="answer-input" placeholder="?" min="0" max="100" autocomplete="off">
        <button id="check-btn">Conferma</button>
      </div>
      <p id="feedback" style="min-height:24px; font-weight:500;"></p>
    </div>

    <!-- RISULTATO -->
    <div id="result-screen" class="hidden">
      <h2>Super Lavoro! 🎉</h2>
      <div class="stars" id="final-stars"></div>
      <p id="final-score"></p>
      <button class="start-btn" id="restart-btn">Gioca Ancora 🔄</button>
    </div>
  </div>

  <script>
    // Stato del gioco
    const state = {
      selectedTables: [],
      totalQuestions: 12,
      questions: [],
      currentIndex: 0,
      score: 0,
      difficulty: 12
    };

    // DOM Elements
    const menuScreen = document.getElementById('menu-screen');
    const gameScreen = document.getElementById('game-screen');
    const resultScreen = document.getElementById('result-screen');
    const tablesGrid = document.getElementById('tables-grid');
    const diffBtns = document.querySelectorAll('.diff-btn');
    const startBtn = document.getElementById('start-btn');
    const exitBtn = document.getElementById('exit-btn');
    const restartBtn = document.getElementById('restart-btn');
    const qCounter = document.getElementById('q-counter');
    const starsCounter = document.getElementById('stars-counter');
    const questionText = document.getElementById('question-text');
    const answerInput = document.getElementById('answer-input');
    const checkBtn = document.getElementById('check-btn');
    const feedback = document.getElementById('feedback');
    const finalStars = document.getElementById('final-stars');
    const finalScore = document.getElementById('final-score');

    // Inizializza tabelline 1-10
    for (let i = 1; i <= 10; i++) {
      const label = document.createElement('label');
      label.innerHTML = `<input type="checkbox" value="${i}"><span>${i}</span>`;
      tablesGrid.appendChild(label);
      label.querySelector('input').addEventListener('change', updateTables);
    }

    function updateTables() {
      state.selectedTables = Array.from(tablesGrid.querySelectorAll('input:checked'))
                                  .map(cb => parseInt(cb.value));
    }

    // Selezione difficoltà
    diffBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        diffBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.difficulty = parseInt(btn.dataset.diff);
      });
    });

    // Avvia gioco
    startBtn.addEventListener('click', () => {
      if (state.selectedTables.length === 0) {
        alert('Seleziona almeno una tabellina!');
        return;
      }
      state.totalQuestions = state.difficulty;
      state.currentIndex = 0;
      state.score = 0;
      generateQuestions();
      showScreen('game');
      updateUI();
      answerInput.focus();
    });

    // Genera domande senza loop infiniti
    function generateQuestions() {
      state.questions = [];
      const pool = [];
      state.selectedTables.forEach(t => {
        for (let m = 1; m <= 10; m++) {
          pool.push({ a: t, b: m, res: t * m });
        }
      });

      // Mescola e prendi il numero richiesto
      pool.sort(() => Math.random() - 0.5);
      state.questions = pool.slice(0, state.totalQuestions).map(q => {
        const missing = Math.random() > 0.5 ? 'a' : 'b';
        return {
          text: missing === 'a' ? `? × ${q.b} = ${q.res}` : `${q.a} × ? = ${q.res}`,
          answer: missing === 'a' ? q.a : q.b
        };
      });
    }

    function showScreen(screen) {
      menuScreen.classList.add('hidden');
      gameScreen.classList.add('hidden');
      resultScreen.classList.add('hidden');
      if (screen === 'menu') menuScreen.classList.remove('hidden');
      if (screen === 'game') gameScreen.classList.remove('hidden');
      if (screen === 'result') resultScreen.classList.remove('hidden');
    }

    function updateUI() {
      qCounter.textContent = `Domanda: ${state.currentIndex + 1} / ${state.totalQuestions}`;
      starsCounter.textContent = `Stelle: ⭐ ${state.score}`;
      questionText.textContent = state.questions[state.currentIndex].text;
      answerInput.value = '';
      feedback.textContent = '';
    }

    checkBtn.addEventListener('click', checkAnswer);
    answerInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });

    function checkAnswer() {
      const val = parseInt(answerInput.value);
      if (isNaN(val)) return;

      const correct = state.questions[state.currentIndex].answer;
      if (val === correct) {
        state.score++;
        feedback.style.color = 'var(--success)';
        feedback.textContent = '✅ Corretto!';
      } else {
        feedback.style.color = 'var(--danger)';
        feedback.textContent = `❌ La risposta era ${correct}`;
      }

      setTimeout(() => {
        state.currentIndex++;
        if (state.currentIndex >= state.totalQuestions) {
          showResults();
        } else {
          updateUI();
          answerInput.focus();
        }
      }, 800);
    }

    function showResults() {
      finalStars.textContent = '⭐'.repeat(state.score) || 'Nessuna stella 😅';
      finalScore.textContent = `Hai indovinato ${state.score} su ${state.totalQuestions}!`;
      showScreen('result');
    }

    exitBtn.addEventListener('click', () => showScreen('menu'));
    restartBtn.addEventListener('click', () => showScreen('menu'));
  </script>
</body>
</html>

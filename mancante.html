<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Fattore Mancante 🕵️‍♂️✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-game: #eef2f7;
            --border-cartoon: #2d3436;
            --testo: #2d3436;
            --primary: #ff477e;
            --correct: #2ecc71;
            --wrong: #e74c3c;
        }

        * {
            box-sizing: border-box;
            font-family: 'Fredoka', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-game);
            color: var(--testo);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: #ff9f43;
            text-shadow: 3px 3px 0px #fff;
            margin-bottom: 10px;
            -webkit-text-stroke: 2px var(--border-cartoon);
        }

        .card {
            background: white;
            border: 6px solid var(--border-cartoon);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 16px 0px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        /* Schermate */
        .setup-screen { display: block; }
        .game-screen { display: none; }
        .result-screen { display: none; }

        h2 {
            font-size: 1.6rem; 
            margin-top: 15px;
            margin-bottom: 10px;
            color: #55efc4;
            -webkit-text-stroke: 1px var(--border-cartoon);
            text-shadow: 2px 2px 0px #fff;
        }

        .griglia-numeri {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 15px 0 25px 0;
        }

        .btn-tabellina {
            background: #fff;
            border: 3px solid var(--border-cartoon);
            border-radius: 16px;
            padding: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--border-cartoon);
            transition: all 0.1s;
        }

        .btn-tabellina.selected {
            background: #ffec99;
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--border-cartoon);
        }

        /* Sezione Difficoltà */
        .difficolta-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 15px 0 25px 0;
        }

        .btn-diff {
            background: white;
            border: 3px solid var(--border-cartoon);
            border-radius: 20px;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--border-cartoon);
            transition: all 0.1s;
        }

        .btn-diff span {
            display: block;
            font-size: 0.9rem;
            font-weight: 400;
            color: #636e72;
            margin-top: 4px;
        }

        .btn-diff#facile.selected { background-color: #55efc4; transform: translateY(4px); box-shadow: 0 2px 0 var(--border-cartoon); color: white; }
        .btn-diff#medio.selected { background-color: #ffcaa1; transform: translateY(4px); box-shadow: 0 2px 0 var(--border-cartoon); }
        .btn-diff#difficile.selected { background-color: #ff7675; transform: translateY(4px); box-shadow: 0 2px 0 var(--border-cartoon); color: white; }

        .btn-diff#facile.selected span, .btn-diff#difficile.selected span { color: white; }

        .btn-start {
            background: var(--correct);
            color: white;
            border: 4px solid var(--border-cartoon);
            border-radius: 20px;
            padding: 15px 40px;
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--border-cartoon);
            margin-top: 10px;
        }

        /* Schermata di Gioco */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .btn-esci {
            background: #ffeaa7;
            border: 2px solid var(--border-cartoon);
            border-radius: 12px;
            padding: 6px 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--border-cartoon);
            transition: all 0.1s;
        }

        .btn-esci:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--border-cartoon);
        }

        .operazione-box {
            font-size: 4.5rem;
            font-weight: 700;
            background: #f8f9fa;
            border: 4px dashed #ced4da;
            border-radius: 24px;
            padding: 20px;
            margin: 30px 0;
            letter-spacing: 2px;
        }

        .operazione-box span.missing-place {
            color: var(--primary);
            background: #fff0f3;
            padding: 0 20px;
            border-radius: 12px;
            border: 3px solid var(--primary);
        }

        .operazione-box span.completed-place {
            color: white;
            background: var(--correct);
            padding: 0 20px;
            border-radius: 12px;
            border: 3px solid var(--border-cartoon);
        }

        .operazione-box span.wrong-place {
            color: white;
            background: var(--wrong);
            padding: 0 20px;
            border-radius: 12px;
            border: 3px solid var(--border-cartoon);
        }

        .griglia-opzioni {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .btn-opzione {
            background: white;
            border: 4px solid var(--border-cartoon);
            border-radius: 24px;
            padding: 25px;
            font-size: 2.5rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 0 var(--border-cartoon);
            transition: all 0.1s;
        }

        .btn-opzione:active {
            transform: translateY(4px);
            box-shadow: 0 6px 0 var(--border-cartoon);
        }

        .btn-opzione.esatto {
            background: var(--correct) !important;
            color: white !important;
            box-shadow: 0 6px 0 #1e7e34 !important;
        }

        .btn-opzione.errato {
            background: var(--wrong) !important;
            color: white !important;
            box-shadow: 0 6px 0 #bd2130 !important;
        }

        .feedback-messaggio {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 20px;
            height: 40px;
        }

        .text-esatto { color: var(--correct); }
        .text-errato { color: var(--wrong); }
    </style>
</head>
<body>

<div class="container">
    <h1>Trova il Fattore Mancante! 🕵️‍♂️🔎</h1>

    <div id="setupScreen" class="card setup-screen">
        <h2>1. Scegli le tabelline:</h2>
        <div class="griglia-numeri">
            </div>

        <h2>2. Scegli la difficoltà:</h2>
        <div class="difficolta-container">
            <button id="facile" class="btn-diff selected" onclick="selezionaDifficolta('facile', 12)">
                Facile 😊
                <span>12 Domande</span>
            </button>
            <button id="medio" class="btn-diff" onclick="selezionaDifficolta('medio', 18)">
                Medio 🤔
                <span>18 Domande</span>
            </button>
            <button id="difficile" class="btn-diff" onclick="selezionaDifficolta('difficile', 24)">
                Difficile 🔥
                <span>24 Domande</span>
            </button>
        </div>

        <button class="btn-start" onclick="iniziaGioco()">Si parte! 🚀</button>
    </div>

    <div id="gameScreen" class="card game-screen">
        <div class="info-bar">
            <span id="infoDomanda">Domanda: 1 / 12</span>
            <span id="infoPunti">Stelle: ⭐ 0</span>
            <button class="btn-esci" onclick="confermaUscita()">🏠 Esci</button>
        </div>

        <div class="operazione-box" id="operazioneTesto"></div>

        <div class="feedback-messaggio" id="feedbackMessaggio"></div>

        <div class="griglia-opzioni" id="opzioniContainer"></div>
    </div>

    <div id="resultScreen" class="card result-screen">
        <h2 style="font-size: 3rem; margin: 0;">Super Lavoro! 🎉</h2>
        <p id="punteggioFinale" style="font-size: 1.8rem; font-weight: 600; margin: 20px 0;"></p>
        <button class="btn-start" onclick="tornaAlSetup()">Gioca Ancora 🔄</button>
    </div>
</div>

<script>
    let tabellineSelezionate = [];
    let difficoltaScelta = 'facile';
    let totaleDomande = 12;
    let punteggio = 0;
    let domandaCorrente = 0;
    
    let quesitoAttuale = {
        n1: 0, n2: 0, prodotto: 0, buco: 1, rispostaEsatta: 0
    };

    const grigliaNumeri = document.querySelector('.griglia-numeri');
    for (let i = 1; i <= 10; i++) {
        const btn = document.createElement('button');
        btn.className = 'btn-tabellina';
        btn.innerText = `×${i}`;
        btn.onclick = () => {
            btn.classList.toggle('selected');
            if (tabellineSelezionate.includes(i)) {
                tabellineSelezionate = tabellineSelezionate.filter(n => n !== i);
            } else {
                tabellineSelezionate.push(i);
            }
        };
        grigliaNumeri.appendChild(btn);
    }

    function selezionaDifficolta(livello, numeroDomande) {
        difficoltaScelta = livello;
        totaleDomande = numeroDomande;
        document.querySelectorAll('.btn-diff').forEach(b => b.classList.remove('selected'));
        document.getElementById(livello).classList.add('selected');
    }

    function iniziaGioco() {
        if (tabellineSelezionate.length === 0) {
            alert("Scegli almeno una tabellina per iniziare!");
            return;
        }
        punteggio = 0;
        domandaCorrente = 1;
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        generaQuesito();
    }

    function generaQuesito() {
        document.getElementById('infoDomanda').innerText = `Domanda: ${domandaCorrente} / ${totaleDomande}`;
        document.getElementById('infoPunti').innerText = `Stelle: ⭐ ${punteggio}`;
        document.getElementById('feedbackMessaggio').innerText = "";

        const n1 = tabellineSelezionate[Math.floor(Math.random() * tabellineSelezionate.length)];
        const n2 = Math.floor(Math.random() * 10) + 1;
        const prodotto = n1 * n2;
        
        const buco = Math.random() > 0.5 ? 1 : 2;
        const rispostaEsatta = (buco === 1) ? n1 : n2;

        quesitoAttuale = { n1, n2, prodotto, buco, rispostaEsatta };

        const box = document.getElementById('operazioneTesto');
        if (buco === 1) {
            box.innerHTML = `<span class="missing-place">?</span> × ${n2} = ${prodotto}`;
        } else {
            box.innerHTML = `${n1} × <span class="missing-place">?</span> = ${prodotto}`;
        }

        const opzioniSet = new Set([rispostaEsatta]);
        while (opzioniSet.size < 4) {
            let sfasamento = 0;
            if (difficoltaScelta === 'facile') {
                sfasamento = Math.floor(Math.random() * 15) - 7; 
            } else if (difficoltaScelta === 'medio') {
                sfasamento = Math.floor(Math.random() * 5) - 2;
            } else {
                sfasamento = Math.random() > 0.5 ? 1 : -1;
            }
            
            const alternativa = Math.max(1, Math.min(10, rispostaEsatta + sfasamento));
            opzioniSet.add(alternativa);
        }

        const opzioniArray = Array.from(opzioniSet).sort(() => Math.random() - 0.5);

        const container = document.getElementById('opzioniContainer');
        container.innerHTML = "";
        
        opzioniArray.forEach(valore => {
            const btn = document.createElement('button');
            btn.className = 'btn-opzione';
            btn.innerText = valore;
            btn.onclick = () => controllaRisposta(valore, btn);
            container.appendChild(btn);
        });
    }

    function controllaRisposta(valoreScelto, bottoneCliccato) {
        const bottoni = document.querySelectorAll('.btn-opzione');
        bottoni.forEach(b => b.removeAttribute('onclick'));

        const box = document.getElementById('operazioneTesto');
        const feedback = document.getElementById('feedbackMessaggio');

        if (valoreScelto === quesitoAttuale.rispostaEsatta) {
            punteggio++;
            bottoneCliccato.classList.add('esatto');
            feedback.innerHTML = "<span class='text-esatto'>Bravissimo! È corretto! ✨</span>";
            
            if (quesitoAttuale.buco === 1) {
                box.innerHTML = `<span class="completed-place">${valoreScelto}</span> × ${quesitoAttuale.n2} = ${quesitoAttuale.prodotto}`;
            } else {
                box.innerHTML = `${quesitoAttuale.n1} × <span class="completed-place">${valoreScelto}</span> = ${quesitoAttuale.prodotto}`;
            }

            confetti({ particleCount: 40, spread: 60, origin: { y: 0.7 } });

        } else {
            bottoneCliccato.classList.add('errato');
            feedback.innerHTML = `<span class='text-errato'>Ops! Ritenta la prossima volta! 💡</span>`;
            
            if (quesitoAttuale.buco === 1) {
                box.innerHTML = `<span class="wrong-place">${valoreScelto}</span> × ${quesitoAttuale.n2} = ${quesitoAttuale.prodotto}`;
            } else {
                box.innerHTML = `${quesitoAttuale.n1} × <span class="wrong-place">${valoreScelto}</span> = ${quesitoAttuale.prodotto}`;
            }

            bottoni.forEach(b => {
                if (parseInt(b.innerText) === quesitoAttuale.rispostaEsatta) {
                    b.classList.add('esatto');
                }
            });
        }

        setTimeout(() => {
            if (domandaCorrente < totaleDomande) {
                domandaCorrente++;
                generaQuesito();
            } else {
                mostraRisultatiFinali();
            }
        }, 3000);
    }

    function confermaUscita() {
        if (confirm("Vuoi davvero interrompere la partita e tornare alla scelta delle tabelline?")) {
            tornaAlSetup();
        }
    }

    function mostraRisultatiFinali() {
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
        
        const percentuale = (punteggio / totaleDomande) * 100;
        document.getElementById('punteggioFinale').innerText = `Hai ottenuto ⭐ ${punteggio} stelle su ${totaleDomande}!`;
        
        if (percentuale >= 75) {
            let duration = 3 * 1000;
            let end = Date.now() + duration;

            (function frame() {
              confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
              confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
              if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    }

    function tornaAlSetup() {
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('setupScreen').style.display = 'block';
        
        const bottoni = document.querySelectorAll('.btn-tabellina');
        bottoni.forEach(b => b.classList.remove('selected'));
        tabellineSelezionate = [];
        
        selezionaDifficolta('facile', 12);
    }
</script>

</body>
</html>
